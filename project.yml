name: TimeShadow
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    ONLY_ACTIVE_ARCH: NO
targets:
  TimeShadow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Intents
      - path: Models
      - path: Services
      - path: Views
    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/LaunchScreen.storyboard
      - path: Resources/PrivacyInfo.xcprivacy
    dependencies:
      - target: TimeShadowWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.steveafrost.TimeShadow
        PRODUCT_NAME: TimeShadow
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/TimeShadow.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        OTHER_SWIFT_FLAGS: "$(inherited) -D MAIN_APP"
  TimeShadowWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widgets
      - path: Intents/StartTimerIntent.swift
      - path: Models/ShadowTheme.swift
      - path: Models/TimerWidgetAttributes.swift
      - path: Services/WidgetDataProvider.swift
    resources:
      - path: Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.steveafrost.TimeShadow.Widgets
        PRODUCT_NAME: TimeShadowWidgets
        INFOPLIST_FILE: Widgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widgets/TimeShadowWidgets.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
schemes:
  TimeShadow:
    build:
      targets:
        TimeShadow: all
        TimeShadowWidgets: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
